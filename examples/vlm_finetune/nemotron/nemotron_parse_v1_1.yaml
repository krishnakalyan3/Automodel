# To run this recipe:
#   automodel examples/vlm_finetune/nemotron/nemotron_parse_v1_1.yaml --nproc-per-node 8
# Adjust --nproc-per-node to the number of GPUs available on your machine.

recipe: FinetuneRecipeForVLM

step_scheduler:
  global_batch_size: 16
  local_batch_size: 2
  ckpt_every_steps: 100
  val_every_steps: 100  # will run every x number of gradient steps
  max_steps: 1000

dist_env:
  backend: nccl
  timeout_minutes: 10

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 42
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForImageTextToText.from_pretrained
  pretrained_model_name_or_path: nvidia/NVIDIA-Nemotron-Parse-v1.1
  torch_dtype: torch.bfloat16
  use_liger_kernel: false
  attn_implementation: eager
  trust_remote_code: True

processor:
  _target_: transformers.AutoProcessor.from_pretrained
  pretrained_model_name_or_path: nvidia/NVIDIA-Nemotron-Parse-v1.1
  trust_remote_code: True

checkpoint:
  enabled: true
  checkpoint_dir: vlm_checkpoints/
  model_save_format: safetensors
  save_consolidated: true

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 1

  sequence_parallel: false

loss_fn:
  _target_: nemo_automodel.components.models.nemotron_parse.nemotron_parse_loss.NemotronParseLoss
  coordinate_weight: 10.0  # Weight multiplier for coordinate tokens
  class_token_start_idx: 50000  # Threshold for coordinate tokens
  num_heads: 1
  ignore_index: -100
  fp32_upcast: true

dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_cord_v2_dataset
  path_or_dataset: naver-clova-ix/cord-v2
  split: train

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  num_workers: 0
  pin_memory: true
  collate_fn:
    _target_: nemo_automodel.components.datasets.vlm.collate_fns.nemotron_parse_collate_fn

validation_dataset:
  _target_: nemo_automodel.components.datasets.vlm.datasets.make_cord_v2_dataset
  path_or_dataset: naver-clova-ix/cord-v2
  split: validation

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  
optimizer:
  _target_: torch.optim.AdamW
  lr: 1e-5
  weight_decay: 0.01
  betas: [0.9, 0.95]

freeze_config:
  freeze_embeddings: true
  freeze_vision_tower: true
  freeze_language_model: false
  
# wandb:
#   project: <your_project_name>  
#   entity: <your_entity_name>
#   name: <your_experiment_name>

ci:
  time: "00:30:00"
