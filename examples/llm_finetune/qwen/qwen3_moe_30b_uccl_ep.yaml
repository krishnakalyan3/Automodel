#
# Qwen3-30B-A3B fine-tuning with UCCL-EP expert parallelism.
#
# UCCL-EP uses libibverbs RC QPs for RDMA instead of NVSHMEM/IBGDA.
# This makes it work on Azure HPC VMs and other environments where
# GPU-to-NIC PCIe P2P (required by DeepEP) is unavailable.
#
# Prerequisites:
#   - Install UCCL-EP:  bash scripts/setup_uccl_ep.sh
#
# Launch example (2 nodes x 8 GPUs each = ep_size 16):
#   torchrun --nnodes=2 --nproc_per_node=8 \
#     -m nemo_automodel.train \
#     --config-name qwen3_moe_30b_uccl_ep

recipe: TrainFinetuneRecipeForNextTokenPrediction

step_scheduler:
  global_batch_size: 512
  local_batch_size: 32
  ckpt_every_steps: 500
  val_every_steps: 100
  num_epochs: 2

dist_env:
  backend: nccl
  timeout_minutes: 10

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1111
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: Qwen/Qwen3-30B-A3B
  backend:
    # UCCL-EP: Azure-compatible RDMA via libibverbs RC QPs
    dispatcher: uccl_ep
    experts: torch_mm

checkpoint:
  enabled: false
  checkpoint_dir: /tmp/checkpoints/
  model_save_format: safetensors
  save_consolidated: true

distributed:
  strategy: fsdp2
  tp_size: 1
  cp_size: 1
  pp_size: 1
  # Set ep_size to the total number of GPUs across all nodes.
  # UCCL-EP supports ep_size: 2, 4, 8, 16, 32, 64, 128.
  ep_size: 16

  sequence_parallel: false
  activation_checkpointing: true

  pipeline:
    pp_schedule: interleaved1f1b
    pp_microbatch_size: 8
    round_virtual_stages_to_pp_multiple: up
    scale_grads_in_schedule: false
    patch_inner_model: false
    patch_causal_lm_model: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  _target_: nemo_automodel.components.datasets.llm.hellaswag.HellaSwag
  path_or_dataset: rowan/hellaswag
  split: train

packed_sequence:
  packed_sequence_size: 0

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater
  shuffle: true

validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.hellaswag.HellaSwag
  path_or_dataset: rowan/hellaswag
  split: validation
  num_samples_limit: 64

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater
  batch_size: 8

optimizer:
  _target_: torch.optim.Adam
  betas: [0.9, 0.95]
  eps: 1e-7
  lr: 1.0e-4
  weight_decay: 0.0

# Uncomment and configure for W&B logging
