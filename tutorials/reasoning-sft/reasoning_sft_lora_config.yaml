# Reasoning SFT with LoRA configuration for NeMo AutoModel.
# To run: automodel tutorials/reasoning-sft/reasoning_sft_lora_config.yaml

recipe: TrainFinetuneRecipeForNextTokenPrediction

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: meta-llama/Llama-3.1-8B-Instruct

peft:
  _target_: nemo_automodel.components._peft.lora.PeftConfig
  match_all_linear: true
  dim: 64
  alpha: 128
  use_triton: true

dataset:
  _target_: nemo_automodel.components.datasets.llm.chat_dataset.ChatDataset
  path_or_dataset_id: /path/to/reasoning_train.jsonl  # REPLACE with your training data

validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.chat_dataset.ChatDataset
  path_or_dataset_id: /path/to/reasoning_val.jsonl  # REPLACE with your validation data

step_scheduler:
  global_batch_size: 256
  local_batch_size: 1
  num_epochs: 1
  max_steps: 2000
  ckpt_every_steps: 100
  val_every_steps: 100

distributed:
  strategy: fsdp2
  tp_size: 1
  dp_size: none
  cp_size: 1
  sequence_parallel: false

optimizer:
  _target_: torch.optim.Adam
  lr: 1e-4
  betas: [0.9, 0.999]
  eps: 1e-8
  weight_decay: 0

lr_scheduler:
  lr_decay_style: cosine
  lr_warmup_steps: 100
  min_lr: 1e-5

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

checkpoint:
  enabled: true
  checkpoint_dir: checkpoints/reasoning_sft
  model_save_format: safetensors
  save_consolidated: true

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater
  shuffle: false

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater
  shuffle: false

clip_grad_norm:
  max_norm: 1.0

dist_env:
  backend: nccl
  timeout_minutes: 1

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1111
  ranked: true

packed_sequence:
  packed_sequence_size: 0  # Set to 8192 for production to enable sequence packing

