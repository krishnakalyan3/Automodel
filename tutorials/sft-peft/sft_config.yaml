# Supervised Fine-Tuning (SFT) configuration for NeMo AutoModel.
# To run: automodel tutorials/sft-peft/sft_config.yaml
# Adjust --nproc-per-node to the number of GPUs available on your machine.

recipe: TrainFinetuneRecipeForNextTokenPrediction

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: meta-llama/Llama-3.2-1B

dataset:
  _target_: nemo_automodel.components.datasets.llm.squad.make_squad_dataset
  dataset_name: rajpurkar/squad
  split: train

validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.squad.make_squad_dataset
  dataset_name: rajpurkar/squad
  split: validation
  limit_dataset_samples: 64

step_scheduler:
  global_batch_size: 8
  local_batch_size: 8
  val_every_steps: 10
  num_epochs: 1
  max_steps: 100

distributed:
  strategy: fsdp2
  tp_size: 1
  dp_size: none
  cp_size: 1

optimizer:
  _target_: torch.optim.Adam
  lr: 5e-6
  betas: [0.9, 0.999]
  eps: 1e-8
  weight_decay: 0

lr_scheduler:
  lr_decay_style: cosine
  min_lr: 1e-6

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

checkpoint:
  enabled: true
  checkpoint_dir: checkpoints/sft
  model_save_format: safetensors
  save_consolidated: true

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater
  shuffle: false

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater
  shuffle: false

clip_grad_norm:
  max_norm: 1.0

dist_env:
  backend: nccl
  timeout_minutes: 1

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1111
  ranked: true

packed_sequence:
  packed_sequence_size: 0

